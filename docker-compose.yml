version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: haigram-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: haigram
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
